<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login de Mascota - PetCare</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-50 font-sans">

    <nav class="bg-white border-b border-gray-100 sticky top-0 z-40">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-20">

                <div class="flex items-center">
                    <div class="flex-shrink-0 flex items-center gap-2 cursor-pointer">
                        <div class="bg-indigo-600 p-2 rounded-xl">
                            <span class="text-2xl">🐾</span>
                        </div>
                        <span class="text-xl font-black text-gray-800 tracking-tight hidden sm:block">Luchi
                            Petpackers</span>
                    </div>
                </div>
            </div>
        </div>
    </nav>
    <div class="max-h-screen flex items-center justify-center p-6">
        <div class="max-w-md w-full bg-white rounded-3xl shadow-xl overflow-hidden border border-gray-100">

            <div class="bg-indigo-600 p-8 text-white text-center">
                <h1 class="text-2xl font-bold">Inicia Sesión</h1>
                <p class="text-indigo-100 mt-1">Para acceder a tu cuenta</p>
            </div>

            <form class="p-8 space-y-5" id="post-form-register">

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">DNI del responsable</label>
                    <input type="text" required name="dniduenio" id="dniduenio"
                        class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-indigo-500 outline-none transition">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Contraseña</label>
                    <input type="password" required name="contrasenia" id="contrasenia"
                        class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-indigo-500 outline-none transition">
                </div>
                <button type="submit" id="btnregistro"
                    class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 rounded-2xl shadow-lg transition duration-300">
                    Guardar Mascota
                </button>
            </form>
        </div>
    </div>

    <script src="assets/js/login.js"></script>

</body>

</html>
